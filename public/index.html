<!--
TYPOGRAPHY:
- What Google Fonts did you choose and why?
I choose Figtree and Quicksand because of their readability and contrast.
- How do they complement each other (font pairing)?
They are slightly different while giving the heading font (Quicksand) more weight
- What font weights did you use?
I increased the font weight of the heading to give the text on my page structure
- How did you make your typography responsive?
I used the rem unit to ensure my text stayed the same size on all screens
 
IMAGES:
- How did you optimize your images?
I optimized my images by cropping them to the same size and using the loading=lazy property
- What file types did you use and why?
I used jpeg files becuase they are the most widely avalible
- How did you ensure your images are responsive?
I used media queries to change the size and stacking of the images based on viewport width, as well as percentage units.
 
RESPONSIVE DESIGN:
- What specific techniques did you use?
I used media queries, rem units, and percentage units to resize content based on viewport size.
- Where can these changes be seen on your site?
These changes can be seen when resizing the website.

CSS Enhancments Reflection:

I used CSS variables to standardize colors and fonts across my website. I used transitions and translations to slide the 
navbar onscreen when clicking on the hamburger menu on a mobile screen. My animation changed the opacity of my images when you click on them.
-->
